<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>ShareCase - Settings</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
 <style>
 body { font-family: 'Arial', sans-serif; background-color: #f5f5f5; margin: 0; }
 header { background-color: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); padding: 10px 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
 .logo { font-size: 20px; font-weight: bold; }
 .logo a { text-decoration: none; color: #000; }
 .search-bar { flex-grow: 1; max-width: 500px; margin: 0 20px; }
 .user-menu { display: flex; align-items: center; }
 .user-menu img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; margin-right: 10px; }
 .container { margin-top: 70px; padding: 20px; }
 .settings-form { max-width: 500px; }
 </style>
</head>
<body>
 <header class="d-flex justify-content-between align-items-center">
 <div class="logo">
 <a href="index.html">ShareCase</a>
 </div>
 <div class="search-bar">
 <input type="text" class="form-control" id="searchInput" placeholder="Search projects...">
 </div>
 <div class="user-menu">
 <img id="headerProfilePic" src="/uploads/default-profile.jpg" alt="Profile Picture">
 <span id="headerProfileName">Your Name</span>
 </div>
 </header>
 <div class="container">
 <h2>Settings</h2>
 <div class="settings-form">
 <form id="settingsForm">
 <div class="mb-3">
 <label for="name" class="form-label">Name</label>
 <input type="text" class="form-control" id="name" name="name">
 </div>
 <div class="mb-3">
 <label for="email" class="form-label">Email</label>
 <input type="email" class="form-control" id="email" name="email">
 </div>
 <div class="mb-3">
 <label for="profilePic" class="form-label">Profile Picture</label>
 <input type="file" class="form-control" id="profilePic" name="profilePic" accept="image/*">
 </div>
 <div class="mb-3">
 <label for="password" class="form-label">New Password</label>
 <input type="password" class="form-control" id="password" name="password" placeholder="Leave blank to keep current password">
 </div>
 <div class="mb-3">
 <label for="notifications" class="form-label">Email Notifications</label>
 <select class="form-control" id="notifications" name="notifications">
 <option value="enabled">Enabled</option>
 <option value="disabled">Disabled</option>
 </select>
 </div>
 <button type="submit" class="btn btn-primary">Save Changes</button>
 </form>
 <hr>
 <h3>Danger Zone</h3>
 <button class="btn btn-danger" id="deleteAccount">Delete Account</button>
 </div>
 </div>
 <script>
 async function loadUserProfileInHeader() {
 try {
 const response = await fetch('/current-user');
 if (response.ok) {
 const user = await response.json();
 document.getElementById('headerProfileName').textContent = user.name;
 document.getElementById('headerProfilePic').src = user.profilePic || '/uploads/default-profile.jpg';
 }
 } catch (error) {
 console.error('Error loading user profile:', error);
 }
 }
 
 document.getElementById('deleteAccount').addEventListener('click', async () => {
 if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
 try {
 const response = await fetch('/delete-account', { method: 'DELETE' });
 if (response.ok) {
 alert('Account deleted successfully.');
 window.location.href = 'index.html';
 } else {
 alert('Failed to delete account.');
 }
 } catch (error) {
 console.error('Error deleting account:', error);
 }
 }
 });
 
 window.onload = () => {
 loadUserProfileInHeader();
 };
 </script>
</body>
</html>
