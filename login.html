<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShareCase</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); text-align: center; }
        .login-container h1 { margin-bottom: 20px; }
        .login-container input { display: block; width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .login-container button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .sso { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Login to ShareCase</h1>
        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="sso">
            <button>Google SSO</button>
            <button>Microsoft SSO</button>
        </div>
        <p><a href="index.html">Back to Home</a></p>
    </div>
</body>
</html>
