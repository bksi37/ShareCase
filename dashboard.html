<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ShareCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; }
        header { background-color: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); padding: 10px 20px; }
        .logo { font-size: 20px; font-weight: bold; }
        .logo a { text-decoration: none; color: #000; }
        .search-bar { flex-grow: 1; max-width: 500px; margin: 0 20px; }
        .user-menu { display: flex; align-items: center; }
        .user-menu button { background: none; border: none; font-size: 20px; margin-left: 10px; }
        .user-menu .btn-icon { font-size: 24px; color: #555; transition: color 0.2s; }
        .user-menu .btn-icon:hover { color: #007bff; }
        .projects { padding: 20px; }
        .add-project { font-size: 50px; cursor: pointer; color: #007bff; text-align: center; margin: 20px 0; background: #e9ecef; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; margin-left: auto; margin-right: auto; display: block; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .project-card { background: #fff; border: none; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); transition: transform 0.2s; }
        .project-card:hover { transform: translateY(-5px); }
        .project-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .card-body { padding: 10px; }
        .card-footer { background: none; border: none; padding: 5px 10px; font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <div class="logo">
            <a href="index.html">ShareCase</a>
        </div>
        <div class="search-bar position-relative">
            <input type="text" class="form-control" id="searchInput" placeholder="Search projects...">
            <button class="btn position-absolute" style="right: 5px; top: 50%; transform: translateY(-50%);" onclick="toggleSidebar()"><i class="fas fa-search"></i></button>
        </div>
        <div class="user-menu">
            <div class="d-flex align-items-center me-3">
                <img id="headerProfilePic" src="/uploads/default-profile.jpg" alt="Profile Picture" style="width: 30px; height: 30px; border-radius: 50%; object-fit: cover; margin-right: 10px;">
                <span id="headerProfileName">Your Name</span>
            </div>
            <button class="btn-icon" onclick="window.location.href='profile.html'"><i class="fas fa-user-circle"></i></button>
            <button class="btn-icon" onclick="window.location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <nav>
                <a href="/logout" class="ms-2">Logout</a>
            </nav>
        </div>
    </header>
    <main class="projects">
        <div class="add-project" onclick="window.location.href='profile.html'">+</div>
        <h2>Your Feed</h2>
        <div class="project-grid"></div>
    </main>
    <script>
        async function loadUserProfileInHeader() {
            try {
                const response = await fetch('/current-user');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('headerProfileName').textContent = user.name;
                    document.getElementById('headerProfilePic').src = user.profilePic || '/uploads/default-profile.jpg';
                }
            } catch (error) {
                console.error('Error loading user profile:', error);
            }
        }

        async function loadProjects(query = '') {
            const url = query ? `/search?q=${encodeURIComponent(query)}` : '/projects';
            const response = await fetch(url);
            const projects = await response.json();
            const grid = document.querySelector('.project-grid');
            grid.innerHTML = '';
            projects.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <img src="${project.image || '/uploads/placeholder.jpg'}" alt="${project.title}" onerror="this.src='/uploads/placeholder.jpg'">
                    <div class="card-body">
                        <h5 class="card-title">${project.title}</h5>
                    </div>
                    <div class="card-footer">
                        <span>Likes: ${project.likes || 0} | Views: ${project.views || 0}</span>
                        <div>By: ${project.author}</div>
                    </div>
                `;
                card.onclick = () => window.location.href = `project.html?id=${index}`;
                grid.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            loadProjects(e.target.value);
        });

        window.onload = () => {
            loadUserProfileInHeader();
            loadProjects();
        };
    </script>
</body>
</html>
