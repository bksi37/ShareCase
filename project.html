<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project - ShareCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; background-color: #f5f5f5; margin: 0; }
        header { background-color: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); padding: 10px 20px; }
        .logo { font-size: 20px; font-weight: bold; }
        .logo a { text-decoration: none; color: #000; }
        .search-bar { flex-grow: 1; max-width: 500px; margin: 0 20px; }
        .user-menu .profile-container { display: flex; align-items: center; cursor: pointer; position: relative; }
        .user-menu img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; margin-right: 10px; }
        .user-menu .dropdown-menu { display: none; position: absolute; top: 100%; right: 0; background: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); border-radius: 4px; padding: 10px 0; z-index: 1000; }
        .user-menu .dropdown-menu a { display: block; padding: 8px 20px; color: #333; text-decoration: none; }
        .user-menu .dropdown-menu a:hover { background: #f0f0f0; }
        .user-menu .profile-container:hover .dropdown-menu { display: block; }
        .user-menu .profile-container::after { content: ''; position: absolute; top: 100%; left: 0; width: 100%; height: 10px; background: transparent; }
        .project-container { padding: 20px; }
        .media-section { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .media-section img { width: 48%; height: 400px; object-fit: cover; border-radius: 8px; }
        #viewport { width: 48%; height: 400px; border: 1px solid #ddd; border-radius: 8px; display: none; }
        .media-section.no-3d img { width: 100%; }
        .info-section { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
        .info-section h1 { font-size: 32px; font-weight: 700; margin-bottom: 15px; }
        .info-section p { font-size: 16px; line-height: 1.6; margin-bottom: 12px; }
        .info-section p strong { font-weight: 500; }
        .engagement { margin-top: 25px; }
        .engagement button { margin-right: 10px; padding: 8px 16px; font-size: 14px; border-radius: 4px; }
        .engagement .btn-primary { background-color: #007bff; border: none; color: #fff; }
        .engagement .btn-primary:hover { background-color: #0056b3; }
        .engagement .btn-secondary { background-color: #6c757d; border: none; color: #fff; }
        .engagement .btn-secondary:hover { background-color: #5a6268; }
        .comments { margin-top: 20px; }
    </style>
</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <div class="logo">
            <a href="index.html">ShareCase</a>
        </div>
        <div class="search-bar position-relative">
            <input type="text" class="form-control" id="searchInput" placeholder="Search projects...">
            <button class="btn position-absolute" style="right: 5px; top: 50%; transform: translateY(-50%);"><i class="fas fa-search"></i></button>
        </div>
        <div class="user-menu">
            <div class="profile-container">
                <img id="headerProfilePic" src="/uploads/default-profile.jpg" alt="Profile Picture">
                <span id="headerProfileName">Your Name</span>
                <div class="dropdown-menu">
                    <a href="profile.html">Profile</a>
                    <a href="settings.html">Settings</a>
                    <a id="authLink" href="login.html">Login</a>
                    <a href="about.html">About</a>
                </div>
            </div>
        </div>
    </header>
    <div class="project-container">
        <div class="media-section" id="mediaSection">
            <img id="image" src="" alt="Project Image">
            <div id="viewport"></div>
        </div>
        <div class="info-section">
            <h1 id="title"></h1>
            <p><strong>Author:</strong> <span id="author"></span></p>
            <p><strong>Description:</strong> <span id="description"></span></p>
            <p><strong>Problem Statement:</strong> <span id="problemStatement"></span></p>
            <p><strong>Collaborators:</strong> <span id="collaborators"></span></p>
            <p><strong>Tags:</strong> <span id="tags"></span></p>
            <div class="engagement">
                <p>Views: <span id="views"></span> | Likes: <span id="likes"></span> | Comments: <span id="comments"></span></p>
                <button class="btn btn-primary" id="likeButton"><i class="fas fa-heart"></i> Like</button>
                <button class="btn btn-secondary"><i class="fas fa-share"></i> Share</button>
            </div>
            <div class="comments">
                <h3>Comments</h3>
                <p>No comments yet.</p>
            </div>
        </div>
    </div>
    <script>
        async function loadUserProfileInHeader() {
            try {
                const response = await fetch('/current-user');
                const authLink = document.getElementById('authLink');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('headerProfileName').textContent = user.name;
                    document.getElementById('headerProfilePic').src = user.profilePic || '/uploads/default-profile.jpg';
                    authLink.textContent = 'Logout';
                    authLink.href = '/logout';
                } else {
                    authLink.textContent = 'Login';
                    authLink.href = 'login.html';
                }
            } catch (error) {
                console.error('Error loading user profile:', error);
                const authLink = document.getElementById('authLink');
                authLink.textContent = 'Login';
                authLink.href = 'login.html';
            }
        }

        async function loadProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            await fetch('/increment-views', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            const response = await fetch('/projects');
            const projects = await response.json();
            const project = projects[id];
            document.getElementById('title').textContent = project.title;
            document.getElementById('author').textContent = project.author;
            document.getElementById('image').src = project.image;
            document.getElementById('description').textContent = project.description;
            document.getElementById('problemStatement').textContent = project.problemStatement;
            document.getElementById('collaborators').textContent = project.collaborators.join(', ');
            document.getElementById('tags').textContent = project.tags.join(', ');
            document.getElementById('views').textContent = project.views || 0;
            document.getElementById('likes').textContent = project.likes || 0;
            document.getElementById('comments').textContent = project.comments || 0;

            if (project.objFile) {
                document.getElementById('viewport').style.display = 'block';
                init3DViewer(project.objFile);
            } else {
                document.getElementById('mediaSection').classList.add('no-3d');
            }

            document.getElementById('likeButton').addEventListener('click', async () => {
                const response = await fetch('/increment-likes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await response.json();
                document.getElementById('likes').textContent = data.likes;
            });
        }

        function init3DViewer(objUrl) {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(400, 400);
            document.getElementById('viewport').appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 1, 1).normalize();
            scene.add(light);

            const loader = new THREE.OBJLoader();
            loader.load(objUrl, (object) => {
                scene.add(object);
                object.position.set(0, 0, 0);
                camera.position.z = 5;
                const animate = () => {
                    requestAnimationFrame(animate);
                    object.rotation.y += 0.01;
                    renderer.render(scene, camera);
                };
                animate();
            }, undefined, (error) => {
                console.error('Error loading .obj file:', error);
                document.getElementById('viewport').style.display = 'none';
                document.getElementById('mediaSection').classList.add('no-3d');
            });
        }

        window.onload = () => {
            loadUserProfileInHeader();
            loadProject();
        };
    </script>
</body>
</html>
