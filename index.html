<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareCase</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; }
        header { background-color: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); padding: 10px 20px; }
        .logo { font-size: 20px; font-weight: bold; }
        .logo a { text-decoration: none; color: #000; }
        .search-bar { flex-grow: 1; max-width: 500px; margin: 0 20px; }
        .user-menu { display: flex; align-items: center; }
        .user-menu button { background: none; border: none; font-size: 20px; margin-left: 10px; }
        .user-menu .btn-icon { font-size: 24px; color: #555; transition: color 0.2s; }
        .user-menu .btn-icon:hover { color: #007bff; }
        .container { display: flex; min-height: calc(100vh - 70px); }
        .sidebar { width: 200px; background: #fff; padding: 20px; box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1); display: none; flex-direction: column; position: fixed; left: 0; top: 70px; bottom: 0; }
        .sidebar h3 { margin-bottom: 10px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { padding: 10px 0; border-bottom: 1px solid #ddd; }
        .projects { flex: 1; padding: 20px; margin-left: 0; transition: margin-left 0.3s; }
        .projects.shifted { margin-left: 200px; }
        .project-card { background: #fff; border: none; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); transition: transform 0.2s; }
        .project-card:hover { transform: translateY(-5px); }
        .project-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .card-body { padding: 10px; }
        .card-footer { background: none; border: none; padding: 5px 10px; font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <div class="logo">
            <a href="index.html">ShareCase</a>
        </div>
        <div class="search-bar">
            <input type="text" class="form-control" placeholder="Search projects...">
        </div>
        <div class="user-menu">
            <button class="btn-icon" onclick="window.location.href='profile.html'"><i class="fas fa-user-circle"></i></button>
            <button class="btn-icon" onclick="window.location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <nav>
                <a href="login.html" class="ms-2">Login</a>
                <a href="about.html" class="ms-2">About</a>
            </nav>
        </div>
    </header>
    <button class="btn btn-primary m-3" onclick="toggleSidebar()">Filter</button>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <h3>Filter</h3>
            <ul>
                <li><input type="checkbox" id="course"><label for="course"> Course</label></li>
                <li><input type="checkbox" id="year"><label for="year"> Year</label></li>
                <li><input type="checkbox" id="personal"><label for="personal"> Personal</label></li>
            </ul>
        </aside>
        <main class="projects" id="projects">
            <h2>Featured Projects</h2>
            <div class="row project-grid"></div>
        </main>
    </div>
    <script>
        async function loadProjects() {
            const response = await fetch('/projects');
            const projects = await response.json();
            const grid = document.querySelector('.project-grid');
            grid.innerHTML = '';
            projects.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'col-md-4 mb-4';
                card.innerHTML = `
                    <div class="card project-card">
                        <img src="${project.file}" alt="${project.title}">
                        <div class="card-body">
                            <h5 class="card-title">${project.title}</h5>
                        </div>
                        <div class="card-footer">
                            <span>Likes: ${project.likes || 0} | Views: ${project.views || 0}</span>
                            <div>By: Your Name</div>
                        </div>
                    </div>
                `;
                card.onclick = () => window.location.href = `project.html?id=${index}`;
                grid.appendChild(card);
            });
        }

        function toggleSidebar() {
            var sidebar = document.getElementById("sidebar");
            var projects = document.getElementById("projects");
            if (sidebar.style.display === "none" || sidebar.style.display === "") {
                sidebar.style.display = "flex";
                projects.classList.add("shifted");
            } else {
                sidebar.style.display = "none";
                projects.classList.remove("shifted");
            }
        }

        window.onload = loadProjects;
    </script>
</body>
</html>
