<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShareCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); text-align: center; max-width: 400px; width: 100%; }
        .login-container h1 { margin-bottom: 20px; }
        .login-container input { display: block; width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .login-container button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .sso { margin-top: 20px; }
        nav a { margin: 0 10px; text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>ShareCase</h1>
        <ul class="nav nav-tabs mb-3">
            <li class="nav-item">
                <a class="nav-link active" href="#" id="signin-tab">Sign In</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" id="signup-tab">Sign Up</a>
            </li>
        </ul>
        <div id="signin-form">
            <form action="/signin" method="POST">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
        </div>
        <div id="signup-form" style="display: none;">
            <form action="/signup" method="POST">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
        </div>
        <div class="sso">
            <button>Google SSO</button>
            <button>Microsoft SSO</button>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
        </nav>
    </div>
    <script>
        document.getElementById('signin-tab').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('signin-tab').classList.add('active');
            document.getElementById('signup-tab').classList.remove('active');
            document.getElementById('signin-form').style.display = 'block';
            document.getElementById('signup-form').style.display = 'none';
        });
        document.getElementById('signup-tab').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('signup-tab').classList.add('active');
            document.getElementById('signin-tab').classList.remove('active');
            document.getElementById('signup-form').style.display = 'block';
            document.getElementById('signin-form').style.display = 'none';
        });
    </script>
</body>
</html>
