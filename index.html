<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', 'Arial', sans-serif; background-color: #f5f5f5; margin: 0; }
        header { background-color: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); padding: 10px 20px; }
        .logo { font-size: 20px; font-weight: bold; }
        .logo a { text-decoration: none; color: #000; }
        .search-bar { flex-grow: 1; max-width: 500px; margin: 0 20px; }
        .user-menu { display: flex; align-items: center; }
        .user-menu button { background: none; border: none; font-size: 20px; margin-left: 10px; }
        .user-menu .btn-icon { font-size: 24px; color: #555; transition: color 0.2s; }
        .user-menu .btn-icon:hover { color: #007bff; }
        .container { display: flex; min-height: calc(100vh - 70px); }
        .sidebar { width: 200px; background: #fff; padding: 20px; box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1); display: none; flex-direction: column; position: fixed; left: 0; top: 70px; bottom: 0; }
        .sidebar h3 { margin-bottom: 10px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { padding: 10px 0; border-bottom: 1px solid #ddd; }
        .projects { flex: 1; padding: 30px; margin-left: 0; transition: margin-left 0.3s; }
        .projects.shifted { margin-left: 200px; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .project-card { background: #fff; border: none; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); transition: transform 0.2s, box-shadow 0.2s; }
        .project-card:hover { transform: scale(1.05); box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); }
        .project-card img { width: 100%; height: 225px; object-fit: cover; border-radius: 8px 8px 0 0; aspect-ratio: 4/3; }
        .card-body { padding: 10px; text-align: left; }
        .card-title { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .card-footer { background: none; border: none; padding: 5px 10px; font-size: 12px; color: #555; text-align: left; }
        .card-footer i { margin-right: 5px; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: static; box-shadow: none; }
            .projects.shifted { margin-left: 0; }
            .project-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        }
    </style>
</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <div class="logo">
            <a href="index.html">ShareCase</a>
        </div>
        <div class="search-bar position-relative">
            <input type="text" class="form-control" id="searchInput" placeholder="Search projects...">
            <button class="btn position-absolute" style="right: 5px; top: 50%; transform: translateY(-50%);" onclick="toggleSidebar()"><i class="fas fa-filter"></i></button>
        </div>
        <div class="user-menu">
            <div class="d-flex align-items-center me-3">
                <img id="headerProfilePic" src="/uploads/default-profile.jpg" alt="Profile Picture" style="width: 30px; height: 30px; border-radius: 50%; object-fit: cover; margin-right: 10px;">
                <span id="headerProfileName">Your Name</span>
            </div>
            <button class="btn-icon" onclick="window.location.href='profile.html'"><i class="fas fa-user-circle"></i></button>
            <button class="btn-icon" onclick="window.location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <nav>
                <a href="login.html" class="ms-2">Login</a>
                <a href="about.html" class="ms-2">About</a>
            </nav>
        </div>
    </header>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <h3>Filter</h3>
            <ul>
                <li><input type="checkbox" id="course" value="Course"><label for="course"> Course</label></li>
                <li><input type="checkbox" id="year" value="Year"><label for="year"> Year</label></li>
                <li><input type="checkbox" id="personal" value="Personal"><label for="personal"> Personal</label></li>
            </ul>
        </aside>
        <main class="projects" id="projects">
            <h2>Featured Projects</h2>
            <div class="project-grid"></div>
        </main>
    </div>
    <script>
        async function loadUserProfileInHeader() {
            try {
                const response = await fetch('/current-user');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('headerProfileName').textContent = user.name;
                    document.getElementById('headerProfilePic').src = user.profilePic || '/uploads/default-profile.jpg';
                }
            } catch (error) {
                console.error('Error loading user profile:', error);
            }
        }

        async function loadProjects(query = '', filters = []) {
            const url = query ? `/search?q=${encodeURIComponent(query)}` : '/projects';
            const response = await fetch(url);
            let projects = await response.json();
            if (filters.length > 0) {
                projects = projects.filter(project =>
                    project.tags.some(tag => filters.includes(tag))
                );
            }
            const grid = document.querySelector('.project-grid');
            grid.innerHTML = '';
            projects.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <img src="${project.image || '/uploads/placeholder.jpg'}" alt="${project.title}" onerror="this.src='/uploads/placeholder.jpg'">
                    <div class="card-body">
                        <h5 class="card-title">${project.title}</h5>
                    </div>
                    <div class="card-footer">
                        <span><i class="fas fa-heart"></i>Likes: ${project.likes || 0} | <i class="fas fa-eye"></i>Views: ${project.views || 0}</span>
                        <div>By: ${project.author}</div>
                    </div>
                `;
                card.onclick = () => window.location.href = `project.html?id=${index}`;
                grid.appendChild(card);
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const projects = document.getElementById("projects");
            if (sidebar.style.display === "none" || sidebar.style.display === "") {
                sidebar.style.display = "flex";
                projects.classList.add("shifted");
            } else {
                sidebar.style.display = "none";
                projects.classList.remove("shifted");
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const filters = Array.from(document.querySelectorAll('.sidebar input:checked')).map(input => input.value);
            loadProjects(e.target.value, filters);
        });

        document.querySelectorAll('.sidebar input').forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const filters = Array.from(document.querySelectorAll('.sidebar input:checked')).map(input => input.value);
                const query = document.getElementById('searchInput').value;
                loadProjects(query, filters);
            });
        });

        window.onload = () => {
            loadUserProfileInHeader();
            loadProjects();
        };
    </script>
</body>
</html>
