<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - ShareCase</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .settings { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
        .settings input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .settings button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        nav a { margin: 0 10px; text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
    <div class="settings">
        <h1>Settings</h1>
        <form>
            <input type="text" placeholder="Name" value="Your Name">
            <input type="email" placeholder="Email" value="your@email.com">
            <input type="password" placeholder="New Password">
            <label><input type="checkbox"> Email Notifications</label>
            <button type="submit">Save</button>
        </form>
        <nav>
            <a href="profile.html">Profile</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="index.html">Logout</a>
        </nav>
    </div>
</body>
</html>
