<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ShareCase</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; }
        header { background-color: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); padding: 10px 20px; }
        .logo { font-size: 20px; font-weight: bold; }
        .logo a { text-decoration: none; color: #000; }
        .search-bar { flex-grow: 1; max-width: 500px; margin: 0 20px; }
        .user-menu { display: flex; align-items: center; }
        .user-menu button { background: none; border: none; font-size: 20px; margin-left: 10px; }
        .user-menu .btn-icon { font-size: 24px; color: #555; transition: color 0.2s; }
        .user-menu .btn-icon:hover { color: #007bff; }
        .profile-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .profile-sidebar { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
        .profile-sidebar img { width: 100px; height: 100px; border-radius: 50%; }
        .profile-sidebar .btn { width: 100%; margin-top: 10px; }
        .profile-main { padding: 20px; }
        .nav-tabs { border-bottom: 1px solid #ddd; }
        .nav-link { color: #555; }
        .nav-link.active { color: #007bff; border-bottom: 2px solid #007bff; }
        .add-project { font-size: 50px; cursor: pointer; color: #007bff; text-align: center; margin: 20px 0; background: #e9ecef; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; margin-left: auto; margin-right: auto; }
        .upload-section { padding: 20px; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .project-card { background: #fff; border: none; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); transition: transform 0.2s; }
        .project-card:hover { transform: translateY(-5px); }
        .project-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .card-body { padding: 10px; }
        .card-footer { background: none; border: none; padding: 5px 10px; font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <div class="logo">
            <a href="index.html">ShareCase</a>
        </div>
        <div class="search-bar">
            <input type="text" class="form-control" placeholder="Search projects...">
        </div>
        <div class="user-menu">
            <button class="btn-icon" onclick="window.location.href='profile.html'"><i class="fas fa-user-circle"></i></button>
            <button class="btn-icon" onclick="window.location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <nav>
                <a href="dashboard.html" class="ms-2">Dashboard</a>
                <a href="index.html" class="ms-2">Logout</a>
            </nav>
        </div>
    </header>
    <div class="profile-container">
        <div class="row">
            <!-- Left Sidebar -->
            <div class="col-md-3">
                <div class="profile-sidebar">
                    <img src="profile.jpg" alt="Profile Picture">
                    <h2>Your Name</h2>
                    <p>📍 USA</p>
                    <button class="btn btn-primary">Edit Profile Info</button>
                    <ul class="project-list mt-3" id="project-list"></ul>
                </div>
            </div>
            <!-- Main Content -->
            <div class="col-md-9 profile-main">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="work-tab">Work</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="drafts-tab">Drafts</a>
                    </li>
                </ul>
                <div class="add-project" onclick="document.querySelector('.upload-section').style.display='block'">+</div>
                <div class="upload-section" style="display: none;">
                    <form id="uploadForm" enctype="multipart/form-data">
                        <input type="text" name="title" class="form-control mb-2" placeholder="Project Title" required>
                        <textarea name="description" class="form-control mb-2" placeholder="Short description..." required></textarea>
                        <input type="file" name="file" class="form-control mb-2" accept="image/*,.obj,.pdf" required>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </form>
                </div>
                <div class="project-grid mt-3" id="work-projects"></div>
                <div class="project-grid mt-3" id="drafts-projects" style="display: none;"></div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            const result = await response.text();
            alert(result);
            e.target.reset();
            document.querySelector('.upload-section').style.display = 'none';
            loadUserProjects();
        });

        async function loadUserProjects() {
            const response = await fetch('/projects');
            const projects = await response.json();
            // Sidebar project list
            const list = document.getElementById('project-list');
            list.innerHTML = '';
            // Work tab project grid
            const workGrid = document.getElementById('work-projects');
            workGrid.innerHTML = '';
            projects.forEach((project, index) => {
                // Sidebar
                const li = document.createElement('li');
                li.innerHTML = `<a href="project.html?id=${index}">${project.title}</a>`;
                list.appendChild(li);
                // Work tab
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <img src="${project.file}" alt="${project.title}">
                    <div class="card-body">
                        <h5 class="card-title">${project.title}</h5>
                    </div>
                    <div class="card-footer">
                        <span>Likes: ${project.likes || 0} | Views: ${project.views || 0}</span>
                        <div>By: Your Name</div>
                    </div>
                `;
                card.onclick = () => window.location.href = `project.html?id=${index}`;
                workGrid.appendChild(card);
            });
        }

        // Tab switching
        document.getElementById('work-tab').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('work-tab').classList.add('active');
            document.getElementById('drafts-tab').classList.remove('active');
            document.getElementById('work-projects').style.display = 'grid';
            document.getElementById('drafts-projects').style.display = 'none';
        });
        document.getElementById('drafts-tab').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('drafts-tab').classList.add('active');
            document.getElementById('work-tab').classList.remove('active');
            document.getElementById('work-projects').style.display = 'none';
            document.getElementById('drafts-projects').style.display = 'grid';
        });

        window.onload = loadUserProjects;
    </script>
</body>
</html>
