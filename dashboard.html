<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ShareCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; }
        header {
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 10px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        .logo { font-size: 20px; font-weight: bold; }
        .logo a { text-decoration: none; color: #000; }
        .search-bar { flex-grow: 1; max-width: 500px; margin: 0 20px; }
        .user-menu { display: flex; align-items: center; }
        .user-menu .profile-container { display: flex; align-items: center; cursor: pointer; position: relative; }
        .user-menu img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; margin-right: 10px; }
        .user-menu .dropdown-menu { display: none; position: absolute; top: 100%; right: 0; background: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); border-radius: 4px; padding: 10px 0; z-index: 1000; }
        .user-menu .dropdown-menu a { display: block; padding: 8px 20px; color: #333; text-decoration: none; }
        .user-menu .dropdown-menu a:hover { background: #f0f0f0; }
        .user-menu .profile-container:hover .dropdown-menu { display: block; }
        .user-menu .profile-container::after { content: ''; position: absolute; top: 100%; left: 0; width: 100%; height: 10px; background: transparent; }
        .container { display: flex; min-height: calc(100vh - 70px); margin-top: 70px; }
        .sidebar {
            width: 200px;
            background: #fff;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            display: none;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 70px;
            bottom: 0;
        }
        .sidebar h3 { margin-bottom: 10px; font-size: 20px; font-weight: 600; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { padding: 10px 0; border-bottom: 1px solid #ddd; }
        .projects { flex: 1; padding: 30px; margin-left: 0; transition: margin-left 0.3s; }
        .projects.shifted { margin-left: 200px; }
        .add-project { font-size: 50px; cursor: pointer; color: #007bff; text-align: center; margin: 20px 0; background: #e9ecef; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; margin-left: auto; margin-right: auto; display: block; }
        .project-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .project-card { background: #fff; border: none; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); transition: transform 0.2s; }
        .project-card:hover { transform: translateY(-5px); }
        .project-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .card-body { padding: 15px; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .card-footer { padding: 10px 15px; font-size: 14px; color: #666; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: static; box-shadow: none; }
            .projects.shifted { margin-left: 0; }
            .project-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        }
    </style>
</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <div class="logo">
            <a href="index.html">ShareCase</a>
        </div>
        <div class="search-bar position-relative">
            <input type="text" class="form-control" id="searchInput" placeholder="Search projects...">
            <button class="btn position-absolute" style="right: 5px; top: 50%; transform: translateY(-50%);" onclick="toggleSidebar()"><i class="fas fa-filter"></i></button>
        </div>
        <div class="user-menu">
            <div class="profile-container">
                <img id="headerProfilePic" src="/uploads/default-profile.jpg" alt="Profile Picture">
                <span id="headerProfileName">Your Name</span>
                <div class="dropdown-menu">
                    <a href="profile.html">Profile</a>
                    <a href="settings.html">Settings</a>
                    <a id="authLink" href="login.html">Login</a>
                    <a href="about.html">About</a>
                </div>
            </div>
        </div>
    </header>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <h3>Filter</h3>
            <ul>
                <li><input type="checkbox" id="course" value="Course"><label for="course"> Course</label></li>
                <li><input type="checkbox" id="year" value="Year"><label for="year"> Year</label></li>
                <li><input type="checkbox" id="personal" value="Personal"><label for="personal"> Personal</label></li>
            </ul>
        </aside>
        <main class="projects" id="projects">
            <div class="add-project" onclick="window.location.href='profile.html'">+</div>
            <h2>For You</h2>
            <div class="project-grid"></div>
        </main>
    </div>
    <script>
        async function loadUserProfileInHeader() {
            try {
                const response = await fetch('/current-user');
                const authLink = document.getElementById('authLink');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('headerProfileName').textContent = user.name;
                    document.getElementById('headerProfilePic').src = user.profilePic || '/uploads/default-profile.jpg';
                    authLink.textContent = 'Logout';
                    authLink.href = '/logout';
                } else {
                    authLink.textContent = 'Login';
                    authLink.href = 'login.html';
                }
            } catch (error) {
                console.error('Error loading user profile:', error);
                const authLink = document.getElementById('authLink');
                authLink.textContent = 'Login';
                authLink.href = 'login.html';
            }
        }

        async function loadProjects(query = '', filters = []) {
            const url = query ? `/search?q=${encodeURIComponent(query)}` : '/projects';
            const response = await fetch(url);
            let projects = await response.json();
            // Filter by current user
            const currentUser = await fetch('/current-user').then(res => res.json());
            projects = projects.filter(project => project.author === currentUser.email);
            if (filters.length > 0) {
                projects = projects.filter(project =>
                    project.tags.some(tag => filters.includes(tag))
                );
            }
            const grid = document.querySelector('.project-grid');
            grid.innerHTML = '';
            projects.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <img src="${project.image || '/uploads/placeholder.jpg'}" alt="${project.title}" onerror="this.src='/uploads/placeholder.jpg'">
                    <div class="card-body">
                        <h5 class="card-title">${project.title}</h5>
                    </div>
                    <div class="card-footer">
                        <span>Likes: ${project.likes || 0} | Views: ${project.views || 0}</span>
                        <div>By: ${project.author}</div>
                    </div>
                `;
                card.onclick = () => window.location.href = `project.html?id=${index}`;
                grid.appendChild(card);
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const projects = document.getElementById("projects");
            if (sidebar.style.display === "none" || sidebar.style.display === "") {
                sidebar.style.display = "flex";
                projects.classList.add("shifted");
            } else {
                sidebar.style.display = "none";
                projects.classList.remove("shifted");
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const filters = Array.from(document.querySelectorAll('.sidebar input:checked')).map(input => input.value);
            loadProjects(e.target.value, filters);
        });

        document.querySelectorAll('.sidebar input').forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const filters = Array.from(document.querySelectorAll('.sidebar input:checked')).map(input => input.value);
                const query = document.getElementById('searchInput').value;
                loadProjects(query, filters);
            });
        });

        window.onload = () => {
            loadUserProfileInHeader();
            loadProjects();
        };
    </script>
</body>
</html>
