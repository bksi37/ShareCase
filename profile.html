<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ShareCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; }
        header { background-color: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
        header.d-flex.justify-content-between.align-items-center { padding: 5px 10px; }
        .logo { font-size: 20px; font-weight: bold; width: 80px; }
        .logo a { text-decoration: none; color: #000; }
        .search-bar { width: 200px; margin-left: 10px; margin-right: 10px; }
        .user-menu { display: flex; align-items: center; width: 120px; height: 50px; }
        
        .user-menu .profile-container { display: flex; align-items: center; cursor: pointer; position: relative; }
        .user-menu img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; margin-right: 10px; }
        .user-menu .dropdown-menu { display: none; position: absolute; top: 100%; right: 0; background: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); border-radius: 4px; padding: 10px 0; z-index: 1000; }
        .user-menu .dropdown-menu a { display: block; padding: 8px 20px; color: #333; text-decoration: none; }
        .user-menu .dropdown-menu a:hover { background: #f0f0f0; }
        .user-menu .profile-container:hover .dropdown-menu { display: block; }
        .user-menu .profile-container::after { content: ''; position: absolute; top: 100%; left: 0; width: 100%; height: 10px; background: transparent; }

        .profile-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .profile-sidebar { padding: 20px; }
        .profile-sidebar img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
        .profile-sidebar .btn { width: 100%; margin-top: 10px; }
        .profile-main { padding: 20px; }
        .nav-tabs { border-bottom: 1px solid #ddd; }
        .nav-link { color: #555; }
        .nav-link.active { color: #007bff; border-bottom: 2px solid #007bff; }
        .add-project { font-size: 50px; cursor: pointer; color: #007bff; text-align: center; margin: 20px 0; background: #e9ecef; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; margin-left: auto; margin-right: auto; }
        .upload-section { padding: 20px; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .project-card { background: #fff; border: none; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); transition: transform 0.2s; position: relative; }
        .project-card:hover { transform: translateY(-5px); }
        .project-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .card-body { padding: 10px; }
        .card-footer { background: none; border: none; padding: 5px 10px; font-size: 14px; color: #555; }
        .delete-btn, .edit-btn { position: absolute; top: 10px; background: #dc3545; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .edit-btn { right: 45px; background: #007bff; }
    </style>
</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <div class="logo">
            <a href="index.html">ShareCase</a>
        </div>
        <div class="search-bar position-relative">
            <input type="text" class="form-control" id="searchInput" placeholder="Search projects...">
            <button class="btn position-absolute" style="right: 5px; top: 50%; transform: translateY(-50%);" onclick="toggleSidebar()"><i class="fas fa-search"></i></button>
        </div>
        <div class="user-menu">
            <div class="profile-container">
                <img id="headerProfilePic" src="/uploads/default-profile.jpg" alt="Profile Picture">
                <span id="headerProfileName">Your Name</span>
                <div class="dropdown-menu">
                    <a href="profile.html">Profile</a>
                    <a href="settings.html">Settings</a>
                    <a href="dashboard.html">Dashboard</a>
                    <a id="authLink" href="/logout">Logout</a>
                </div>
            </div>
        </div>
    </header>
    <div class="profile-container">
        <div class="row">
            <!-- Left Sidebar -->
            <div class="col-md-3">
                <div class="profile-sidebar">
                    <img id="profilePic" src="/uploads/default-profile.jpg" alt="Profile Picture">
                    <h2 id="profileName">Your Name</h2>
                    <button class="btn btn-primary" onclick="document.querySelector('.edit-profile-section').style.display='block'">Edit Profile Info</button>
                    <div class="edit-profile-section" style="display: none;">
                        <form id="editProfileForm" enctype="multipart/form-data" action="/update-profile" method="POST">
                            <input type="text" name="name" class="form-control mb-2" placeholder="Your Name" required>
                            <input type="file" name="profilePic" class="form-control mb-2" accept="image/*">
                            <button type="submit" class="btn btn-primary">Save</button>
                        </form>
                    </div>
                    <ul class="project-list mt-3" id="project-list"></ul>
                </div>
            </div>
            <!-- Main Content -->
            <div class="col-md-9 profile-main">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="work-tab">Work</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="drafts-tab">Drafts</a>
                    </li>
                </ul>
                <div class="add-project" onclick="showUploadForm()">+</div>
                <div class="upload-section" style="display: none;">
                    <form id="uploadForm" enctype="multipart/form-data">
                        <input type="text" name="title" class="form-control mb-2" placeholder="Project Title" required>
                        <textarea name="description" class="form-control mb-2" placeholder="Project Description" required></textarea>
                        <textarea name="problemStatement" class="form-control mb-2" placeholder="Problem Statement" required></textarea>
                        <input type="text" name="collaborators" class="form-control mb-2" placeholder="Collaborators (comma-separated emails)">
                        <input type="text" name="tags" class="form-control mb-2" placeholder="Tags (e.g., MECH101, Robotics, Personal)" list="course-tags">
                        <datalist id="course-tags">
                            <option value="MECH101">Mechanical Engineering 101</option>
                            <option value="MECH201">Mechanical Engineering 201</option>
                            <option value="ELEC101">Electrical Engineering 101</option>
                            <option value="CIVIL101">Civil Engineering 101</option>
                            <option value="COMP101">Computer Engineering 101</option>
                            <option value="Robotics">Robotics</option>
                            <option value="Thermodynamics">Thermodynamics</option>
                            <option value="FluidMechanics">Fluid Mechanics</option>
                            <option value="Personal">Personal</option>
                        </datalist>
                        <input type="file" name="image" class="form-control mb-2" accept="image/*">
                        <input type="file" name="objFile" class="form-control mb-2" accept=".obj">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
                            <button type="button" class="btn btn-secondary" onclick="saveDraft()">Save as Draft</button>
                            <button type="button" class="btn btn-secondary" onclick="cancelUpload()">Cancel</button>
                        </div>
                    </form>
                </div>
                <div class="project-grid mt-3" id="work-projects"></div>
                <div class="project-grid mt-3" id="drafts-projects" style="display: none;"></div>
            </div>
        </div>
    </div>
    <script>
        async function loadUserProfileInHeader() {
            try {
                const response = await fetch('/current-user');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('headerProfileName').textContent = user.name;
                    document.getElementById('headerProfilePic').src = user.profilePic || '/uploads/default-profile.jpg';
                    const authLink = document.getElementById('authLink');
                    authLink.textContent = 'Logout';
                    authLink.href = '/logout';
                } else {
                    const authLink = document.getElementById('authLink');
                    authLink.textContent = 'Login';
                    authLink.href = 'login.html';
                }
            } catch (error) {
                console.error('Error loading user profile:', error);
            }
        }

        async function loadUserProfile() {
            const response = await fetch('/current-user');
            const user = await response.json();
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profilePic').src = user.profilePic || '/uploads/default-profile.jpg';
        }

        async function loadUserProjects() {
            const response = await fetch('/projects');
            if (!response.ok) return;
            const projects = await response.json();
            const userResponse = await fetch('/current-user');
            if (!userResponse.ok) return;
            const user = await userResponse.json();
            const list = document.getElementById('project-list');
            const workGrid = document.getElementById('work-projects');
            const draftsGrid = document.getElementById('drafts-projects');
            list.innerHTML = '';
            workGrid.innerHTML = '';
            draftsGrid.innerHTML = '';

            projects.forEach((project, index) => {
                if (project.author === user.email) {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="project.html?id=${index}">${project.title}</a>`;
                    list.appendChild(li);

                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.innerHTML = `
                        <img src="${project.image || '/uploads/placeholder.jpg'}" alt="${project.title}" onerror="this.src='/uploads/placeholder.jpg'">
                        <div class="card-body">
                            <h5 class="card-title">${project.title}</h5>
                        </div>
                        <div class="card-footer">
                            <span>Likes: ${project.likes || 0} | Views: ${project.views || 0}</span>
                            <div>By: ${project.author}</div>
                        </div>
                        <button class="edit-btn" onclick="editProject(${index}, event)"><i class="fas fa-edit"></i></button>
                        <button class="delete-btn" onclick="deleteProject(${index}, event)"><i class="fas fa-trash"></i></button>
                    `;
                    card.onclick = (e) => {
                        if (!e.target.closest('.delete-btn') && !e.target.closest('.edit-btn')) {
                            if (project.isDraft) {
                                editProject(index, e);
                            } else {
                                window.location.href = `project.html?id=${index}`;
                            }
                        }
                    };

                    if (project.isDraft === true) {
                        draftsGrid.appendChild(card);
                    } else {
                        workGrid.appendChild(card);
                    }
                }
            });
        }

        async function deleteProject(index, event) {
            event.stopPropagation();
            if (confirm('Are you sure you want to delete this project?')) {
                const response = await fetch('/delete-project', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: index })
                });
                if (response.ok) {
                    loadUserProjects();
                } else {
                    alert('Failed to delete project');
                }
            }
        }

        function showUploadForm() {
            const uploadSection = document.querySelector('.upload-section');
            const form = document.getElementById('uploadForm');
            form.reset();
            document.getElementById('submitBtn').textContent = 'Submit';
            uploadSection.style.display = 'block';
            setupDefaultSubmitHandler();
            window.scrollTo(0, uploadSection.offsetTop); // Scroll to form
        }

        async function editProject(index, event) {
            event.stopPropagation();
            const response = await fetch(`/project/${index}`);
            if (!response.ok) {
                alert('Failed to load project data');
                console.error('Fetch error:', response.status);
                return;
            }
            const project = await response.json();
            
            const uploadSection = document.querySelector('.upload-section');
            const form = document.getElementById('uploadForm');
            
            // Populate form fields
            form.title.value = project.title || '';
            form.description.value = project.description || '';
            form.problemStatement.value = project.problemStatement || '';
            form.collaborators.value = project.collaborators?.join(', ') || '';
            form.tags.value = project.tags?.join(', ') || '';
            
            // Show and scroll to form
            uploadSection.style.display = 'block';
            document.getElementById('submitBtn').textContent = 'Update';
            window.scrollTo(0, uploadSection.offsetTop); // Scroll to form
            
            // Set up update handler
            form.onsubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(form);
                formData.append('id', index);
                formData.append('isDraft', project.isDraft ? 'true' : 'false');
                const response = await fetch('/update-project', {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    const result = await response.text();
                    alert(result);
                    form.reset();
                    uploadSection.style.display = 'none';
                    loadUserProjects();
                } else {
                    alert('Failed to update project');
                    console.error('Update error:', response.status);
                }
            };
        }

        function setupDefaultSubmitHandler() {
            const form = document.getElementById('uploadForm');
            form.onsubmit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                formData.append('isDraft', 'false');
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    const result = await response.text();
                    alert(result);
                    e.target.reset();
                    document.querySelector('.upload-section').style.display = 'none';
                    loadUserProjects();
                } else {
                    alert('Failed to submit project');
                }
            };
        }

        async function saveDraft() {
            const form = document.getElementById('uploadForm');
            const formData = new FormData(form);
            formData.append('isDraft', 'true');
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            if (response.ok) {
                const result = await response.text();
                alert(result);
                form.reset();
                document.querySelector('.upload-section').style.display = 'none';
                loadUserProjects();
            } else {
                alert('Failed to save draft');
            }
        }

        function cancelUpload() {
            const form = document.getElementById('uploadForm');
            form.reset();
            document.querySelector('.upload-section').style.display = 'none';
            setupDefaultSubmitHandler();
        }

        document.getElementById('work-tab').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('work-tab').classList.add('active');
            document.getElementById('drafts-tab').classList.remove('active');
            document.getElementById('work-projects').style.display = 'grid';
            document.getElementById('drafts-projects').style.display = 'none';
        });
        document.getElementById('drafts-tab').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('drafts-tab').classList.add('active');
            document.getElementById('work-tab').classList.remove('active');
            document.getElementById('work-projects').style.display = 'none';
            document.getElementById('drafts-projects').style.display = 'grid';
        });

        window.onload = () => {
            loadUserProfileInHeader();
            loadUserProfile();
            loadUserProjects();
        };
    </script>
</body>
</html>
