<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project - ShareCase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; }
        header { background-color: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); padding: 10px 20px; }
        .logo { font-size: 20px; font-weight: bold; }
        .logo a { text-decoration: none; color: #000; }
        .search-bar { flex-grow: 1; max-width: 500px; margin: 0 20px; }
        .user-menu { display: flex; align-items: center; }
        .user-menu button { background: none; border: none; font-size: 20px; margin-left: 10px; }
        .user-menu .btn-icon { font-size: 24px; color: #555; transition: color 0.2s; }
        .user-menu .btn-icon:hover { color: #007bff; }
        .project-container { padding: 20px; }
        .media-section { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .media-section img { width: 48%; height: 400px; object-fit: cover; border-radius: 8px; }
        #viewport { width: 48%; height: 400px; border: 1px solid #ddd; border-radius: 8px; }
        .info-section { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
        .engagement { margin-top: 20px; }
        .engagement button { margin-right: 10px; }
        .comments { margin-top: 20px; }
    </style>
</head>
<body>
    <header class="d-flex justify-content-between align-items-center">
        <div class="logo">
            <a href="index.html">ShareCase</a>
        </div>
        <div class="search-bar">
            <input type="text" class="form-control" id="searchInput" placeholder="Search projects...">
        </div>
        <div class="user-menu">
            <button class="btn-icon" onclick="window.location.href='profile.html'"><i class="fas fa-user-circle"></i></button>
            <button class="btn-icon" onclick="window.location.href='settings.html'"><i class="fas fa-cog"></i></button>
            <nav>
                <a href="dashboard.html" class="ms-2">Dashboard</a>
                <a href="/logout" class="ms-2">Logout</a>
            </nav>
        </div>
    </header>
    <div class="project-container">
        <div class="media-section">
            <img id="image" src="" alt="Project Image">
            <div id="viewport"></div>
        </div>
        <div class="info-section">
            <h1 id="title"></h1>
            <p><strong>Author:</strong> <span id="author"></span></p>
            <p><strong>Description:</strong> <span id="description"></span></p>
            <p><strong>Problem Statement:</strong> <span id="problemStatement"></span></p>
            <p><strong>Collaborators:</strong> <span id="collaborators"></span></p>
            <p><strong>Tags:</strong> <span id="tags"></span></p>
            <div class="engagement">
                <p>Views: <span id="views"></span> | Likes: <span id="likes"></span> | Comments: <span id="comments"></span></p>
                <button class="btn btn-primary">Like</button>
                <button class="btn btn-secondary">Share</button>
            </div>
            <div class="comments">
                <h3>Comments</h3>
                <p>No comments yet.</p>
            </div>
        </div>
    </div>
    <script>
        async function loadProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const response = await fetch('/projects');
            const projects = await response.json();
            const project = projects[id];
            document.getElementById('title').textContent = project.title;
            document.getElementById('author').textContent = project.author;
            document.getElementById('image').src = project.image;
            document.getElementById('description').textContent = project.description;
            document.getElementById('problemStatement').textContent = project.problemStatement;
            document.getElementById('collaborators').textContent = project.collaborators.join(', ');
            document.getElementById('tags').textContent = project.tags.join(', ');
            document.getElementById('views').textContent = project.views || 0;
            document.getElementById('likes').textContent = project.likes || 0;
            document.getElementById('comments').textContent = project.comments || 0;

            if (project.objFile) {
                init3DViewer(project.objFile);
            } else {
                document.getElementById('viewport').innerHTML = '<p>No 3D model available.</p>';
            }
        }

        function init3DViewer(objUrl) {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(400, 400);
            document.getElementById('viewport').appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 1, 1).normalize();
            scene.add(light);

            const loader = new THREE.OBJLoader();
            loader.load(objUrl, (object) => {
                scene.add(object);
                object.position.set(0, 0, 0);
                camera.position.z = 5;
                const animate = () => {
                    requestAnimationFrame(animate);
                    object.rotation.y += 0.01;
                    renderer.render(scene, camera);
                };
                animate();
            }, undefined, (error) => {
                console.error('Error loading .obj file:', error);
                document.getElementById('viewport').innerHTML = '<p>Error loading 3D model.</p>';
            });
        }

        window.onload = loadProject;
    </script>
</body>
</html>
